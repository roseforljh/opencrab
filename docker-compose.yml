services:
  opencrab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
        GOPROXY: ${DOCKER_GOPROXY:-https://proxy.golang.org,direct}
        APP_VERSION: ${OPENCRAB_APP_VERSION:-dev}
    image: opencrab-local:latest
    container_name: opencrab
    restart: unless-stopped
    ports:
      - "5946:3000"
    volumes:
      - ./data:/data
    environment:
      - SQL_DSN=local
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
    healthcheck:
      test: ["CMD", "/opencrab", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
