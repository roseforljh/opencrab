services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencrab-api
    environment:
      OPENCRAB_APP_NAME: OpenCrab
      OPENCRAB_ENV: production
      OPENCRAB_HTTP_ADDR: :8080
      OPENCRAB_DB_PATH: /app/runtime/opencrab.db
    volumes:
      - opencrab-runtime:/app/runtime
    ports:
      - "18080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: opencrab-web
    depends_on:
      - api
    environment:
      NODE_ENV: production
      OPENCRAB_ADMIN_API_BASE: http://api:8080
    ports:
      - "13000:3000"

volumes:
  opencrab-runtime:
